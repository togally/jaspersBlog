<header class="site-header">
  <div class="site-header__inner">
    <div class="site-header__brand">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title | default: "Jasper's Blog" }}</a>
      {%- if site.description -%}
        <p class="site-tagline">{{ site.description }}</p>
      {%- endif -%}
    </div>
    <nav class="site-header__nav">
      {%- assign current = page.url -%}
      <a href="{{ '/' | relative_url }}"{% if current == '/' %} class="active"{% endif %}>首页</a>
      <a href="{{ '/about/' | relative_url }}"{% if current contains '/about' %} class="active"{% endif %}>关于</a>
      <button id="search-trigger" class="site-header__search-trigger" aria-label="搜索" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </nav>
  </div>
</header>
